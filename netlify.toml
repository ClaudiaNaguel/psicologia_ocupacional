[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https:;
      font-src 'self';
      connect-src 'self' https://lwhdrokejxetisdtdmkv.supabase.co wss://lwhdrokejxetisdtdmkv.supabase.co;
      frame-src 'none';
      object-src 'none';
    """


[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200